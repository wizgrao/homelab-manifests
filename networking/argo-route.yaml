apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: default
spec:
  parentRefs:
    - name: argo-gateway
      namespace: argocd
      sectionName: web
  rules:
    - backendRefs:
        - name: argocd-server
          namespace: argocd
          port: 80
